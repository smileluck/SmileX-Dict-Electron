services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro .env
    environment:
      - DATABASE_URL=sqlite:///app/data/smilex.db
      - SECRET_KEY=change-me-in-production
      - ALLOWED_ORIGINS=["*"]
    restart: unless-stopped
