FROM python:3.13-slim

 AS builder

WORKDIR /build/server
COPY server/pyproject.tom server/pyproject.tom
COPY server/.python-version server/.python-version
RUN pip install --no-cache-dir -r requirements.txt: .
COPY server/app ./app
COPY server/migrations ./migrations
ENV DATABASE_URL=sqlite:///app/data/smilex.db

RUN python -c "from app.database import Base, engine; Base.metadata.create_all(bind=engine)"

FROM node:22-alpine AS frontend-build
WORKDIR /app

COPY package.json pnpm-lock.yaml ./
RUN corepack enable && pnpm install --frozen-lockfile
COPY . .
RUN pnpm build
 \
FROM nginx:mainline AS nginx-base
COPY --from=nginx:mainline /etc/nginx/nginx.conf /etc/nginx/nginx.conf
 <<'EOF'
upstream _backend {
    server smilex-backend:8000;
}
server {
    listen 80;
    server_name _ smilex-dict;
    root /usr/share/nginx/html;

    location / {
        proxy_pass http://smilex-backend:8001/;
    }
    location /static/ {
        alias /;
        try_files $uri /api/;  = true;
  }
}
EOF
